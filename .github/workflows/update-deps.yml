name: Update Dependencies

on:
  # Run every day.
  schedule:
    - cron: '0 3 * * *'
  # And on on every PR merge so we get the updated dependencies ASAP, and to make sure the changelog doesn't conflict.
  push:
    branches:
      - main


permissions:
  contents: write
  pull-requests: write
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: getsentry/github-workflows/updater@26f565c05d0dd49f703d238706b775883037d76b # v3
        with:
          path: scripts/update-android.sh
          name: Android SDK
          pr-strategy: update
          ssh-key: ${{ secrets.CI_DEPLOY_KEY }}

  cocoa:
    runs-on: ubuntu-latest
    steps:
      - uses: getsentry/github-workflows/updater@26f565c05d0dd49f703d238706b775883037d76b # v3
        with:
          path: scripts/update-cocoa.sh
          name: Cocoa SDK
          pr-strategy: update
          ssh-key: ${{ secrets.CI_DEPLOY_KEY }}

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: getsentry/github-workflows/updater@26f565c05d0dd49f703d238706b775883037d76b # v3
        with:
          path: scripts/update-javascript.sh
          name: JavaScript SDK
          pr-strategy: update
          ssh-key: ${{ secrets.CI_DEPLOY_KEY }}

  javascript-siblings:
    runs-on: ubuntu-latest
    steps:
      - uses: getsentry/github-workflows/updater@26f565c05d0dd49f703d238706b775883037d76b # v3
        with:
          path: scripts/update-javascript-siblings.sh
          name: JavaScript Sibling SDKs
          pr-strategy: update
          ssh-key: ${{ secrets.CI_DEPLOY_KEY }}

  wizard:
    runs-on: ubuntu-latest
    steps:
      - uses: getsentry/github-workflows/updater@26f565c05d0dd49f703d238706b775883037d76b # v3
        with:
          path: scripts/update-wizard.sh
          name: Wizard
          pr-strategy: update
          changelog-entry: false
          ssh-key: ${{ secrets.CI_DEPLOY_KEY }}
